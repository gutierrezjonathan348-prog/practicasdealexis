<!DOCTYPE html>
<html>
<head>
<title>Inicio</title>

<style>

body{
    margin:0;
    height:100vh;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;

    background-image:url("Conalep.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* BARRA SUPERIOR */
.marquesina{
    background:rgba(0,0,0,0.75);
    padding:14px;
    font-size:28px;
    font-weight:bold;
    letter-spacing:1px;
    box-shadow:0 4px 10px rgba(0,0,0,.4);
}

/* CONTENEDOR PRINCIPAL */
.info{
    margin-top:160px;
    background:rgba(0,0,0,0.65);
    display:inline-block;
    padding:30px 35px;
    border-radius:18px;
    font-size:22px;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
    backdrop-filter:blur(4px);
}

/* TITULO */
.info h1{
    margin-bottom:10px;
    font-size:28px;
}

/* TEXTO */
.info p{
    margin:8px 0;
    font-size:20px;
}

</style>

</head>

<body>

<div class="marquesina">
<marquee>Practicas de DEWE</marquee>
</div>

<div class="info">

    <h1>Jonathan Alexis Gutierrez Hernandez</h1>

    <p>Carrera: Informatica</p>
    <p>Grupo: 604</p>

</div>

</body>
</html>
